<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operation: vuLLM</title>
  <script>
    // GitHub Pages SPA redirect — forwards 404s back to index.html with the path preserved
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
