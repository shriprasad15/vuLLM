<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operation: vuLLM</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // Stores the full path in sessionStorage then redirects to the root index.html.
    // The index.html script reads it back and calls history.replaceState.
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('redirect', path + search + hash);
    window.location.replace(
      window.location.protocol + '//' + window.location.hostname +
      (window.location.port ? ':' + window.location.port : '') +
      '/vuLLM/'
    );
  </script>
</head>
<body></body>
</html>
